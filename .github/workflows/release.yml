name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  windows-amd64:
    name: Build Windows amd64 release
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: "0"

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags="-s -w" -o dist/codex-remote-control-shim-windows-amd64.exe .

      - name: Create checksum file
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 dist\codex-remote-control-shim-windows-amd64.exe |
            ForEach-Object {
              "$($_.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_.Path))"
            } |
            Set-Content -Encoding ascii dist\SHA256SUMS.txt

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag `
            "dist\codex-remote-control-shim-windows-amd64.exe" `
            "dist\SHA256SUMS.txt" `
            --title $tag `
            --generate-notes `
            --verify-tag
